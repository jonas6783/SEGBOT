<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="340" rx="12" fill="#0e1015"/>
  <text x="350" y="34" text-anchor="middle" fill="#e8eaed" font-size="17" font-weight="600">Invertierte Kinematik — der Roboter bewegt das Bauteil</text>
  <text x="350" y="55" text-anchor="middle" fill="#8b94a5" font-size="12">Kamera und Markierstift stehen fest, der KUKA führt das Gussteil vorbei</text>

  <!-- ortsfester Stifthalter -->
  <g>
    <rect x="335" y="70" width="30" height="26" rx="4" fill="#262a33" stroke="#3a3f49"/>
    <rect x="341" y="96" width="18" height="52" rx="3" fill="#3a3f49"/>
    <rect x="345" y="148" width="10" height="26" fill="#8b94a5"/>
    <polygon points="345,174 355,174 350,190" fill="#ff7a18">
      <animate attributeName="opacity" values="1;0.75;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <text x="378" y="112" fill="#8b94a5" font-size="12">Stift</text>
    <text x="378" y="127" fill="#8b94a5" font-size="12">ortsfest</text>
  </g>

  <!-- bewegtes Bauteil (Gruppe pendelt, Markierlinie waechst mit) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="-95 0; 95 0; 95 0; -95 0" keyTimes="0;0.45;0.55;1"
      dur="7s" repeatCount="indefinite"/>
    <!-- Greifer-Andeutung -->
    <line x1="255" y1="0" x2="292" y2="176" stroke="#3a3f49" stroke-width="7" stroke-linecap="round"/>
    <circle cx="292" cy="178" r="9" fill="#262a33" stroke="#8b94a5"/>
    <rect x="278" y="184" width="28" height="12" rx="3" fill="#3a3f49"/>
    <!-- Bauteil -->
    <rect x="230" y="196" width="240" height="58" rx="8" fill="#1f232c" stroke="#8b94a5" stroke-width="1.5"/>
    <text x="350" y="230" text-anchor="middle" fill="#5c6570" font-size="12">Gussteil</text>
    <!-- Defekte -->
    <circle cx="300" cy="204" r="5" fill="#ef4444"/>
    <circle cx="418" cy="205" r="7" fill="#ec4899"/>
    <!-- Markierlinie: waechst, waehrend das Bauteil nach rechts faehrt -->
    <line x1="445" y1="196" x2="255" y2="196" stroke="#ff7a18" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="190" stroke-dashoffset="190">
      <animate attributeName="stroke-dashoffset" values="190;0;0;190"
               keyTimes="0;0.45;0.98;1" dur="7s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Bewegungs-Pfeil -->
  <g stroke="#8b94a5" fill="#8b94a5">
    <line x1="240" y1="286" x2="460" y2="286" stroke-dasharray="5 5"/>
    <polygon points="232,286 244,280 244,292"/>
    <polygon points="468,286 456,280 456,292"/>
  </g>
  <text x="350" y="308" text-anchor="middle" fill="#8b94a5" font-size="12">Bewegung des Bauteils — der Stift zeichnet die Markierung</text>
</svg>
