<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 150" font-family="Segoe UI, Arial, sans-serif">
  <rect width="940" height="150" rx="12" fill="#0e1015"/>
  <defs>
    <g id="box">
      <rect width="150" height="74" rx="10" fill="#1f232c" stroke="#3a3f49" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- Verbindungslinie -->
  <line x1="40" y1="75" x2="900" y2="75" stroke="#262a33" stroke-width="3"/>

  <!-- Stufen -->
  <g transform="translate(30,38)">
    <use href="#box"/>
    <rect width="150" height="74" rx="10" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;1;0;0;0;0;0" keyTimes="0;0.08;0.2;0.4;0.6;0.8;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="75" y="24" text-anchor="middle" fill="#ff7a18" font-size="12" font-weight="700">01</text>
    <text x="75" y="43" text-anchor="middle" fill="#e8eaed" font-size="13">Erfassung</text>
    <text x="75" y="60" text-anchor="middle" fill="#8b94a5" font-size="10.5">D405 · YOLO · SAM</text>
  </g>
  <g transform="translate(212,38)">
    <use href="#box"/>
    <rect width="150" height="74" rx="10" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0;0;0" keyTimes="0;0.18;0.28;0.4;0.6;0.8;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="75" y="24" text-anchor="middle" fill="#ff7a18" font-size="12" font-weight="700">02</text>
    <text x="75" y="43" text-anchor="middle" fill="#e8eaed" font-size="13">Registrierung</text>
    <text x="75" y="60" text-anchor="middle" fill="#8b94a5" font-size="10.5">Scan → CAD (ICP)</text>
  </g>
  <g transform="translate(394,38)">
    <use href="#box"/>
    <rect width="150" height="74" rx="10" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;0;0;0" keyTimes="0;0.2;0.38;0.48;0.6;0.8;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="75" y="24" text-anchor="middle" fill="#ff7a18" font-size="12" font-weight="700">03</text>
    <text x="75" y="43" text-anchor="middle" fill="#e8eaed" font-size="13">Soll-Ist-Vergleich</text>
    <text x="75" y="60" text-anchor="middle" fill="#8b94a5" font-size="10.5">Befund · Schleifpfade</text>
  </g>
  <g transform="translate(576,38)">
    <use href="#box"/>
    <rect width="150" height="74" rx="10" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;0;0" keyTimes="0;0.2;0.4;0.58;0.68;0.8;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="75" y="24" text-anchor="middle" fill="#ff7a18" font-size="12" font-weight="700">04</text>
    <text x="75" y="43" text-anchor="middle" fill="#e8eaed" font-size="13">Transformation</text>
    <text x="75" y="60" text-anchor="middle" fill="#8b94a5" font-size="10.5">Kalibrierung · Gate</text>
  </g>
  <g transform="translate(758,38)">
    <use href="#box"/>
    <rect width="150" height="74" rx="10" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;1;0" keyTimes="0;0.2;0.4;0.6;0.78;0.88;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <text x="75" y="24" text-anchor="middle" fill="#ff7a18" font-size="12" font-weight="700">05</text>
    <text x="75" y="43" text-anchor="middle" fill="#e8eaed" font-size="13">Roboter</text>
    <text x="75" y="60" text-anchor="middle" fill="#8b94a5" font-size="10.5">KUKA · Sunrise.OS</text>
  </g>

  <!-- wandernder Datenpunkt -->
  <circle r="7" fill="#ff7a18">
    <animateMotion path="M 40 75 H 900" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle r="12" fill="none" stroke="#ff7a18" stroke-width="2" opacity="0.5">
    <animateMotion path="M 40 75 H 900" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="r" values="8;14;8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
